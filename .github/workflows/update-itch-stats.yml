name: Update itch.io Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-itch-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate itch.io SVG
        env:
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: node scripts/generate-itch-stats.js

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/itch-stats.svg
          git commit -m "Update itch.io stats" || echo "No changes to commit"
          git push
