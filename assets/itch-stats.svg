<?xml version="1.0" encoding="UTF-8"?>
<svg width="920" height="336" viewBox="0 0 920 336" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="itch-placeholder-title itch-placeholder-desc">
  <title id="itch-placeholder-title">itch.io stats placeholder</title>
  <desc id="itch-placeholder-desc">Scarlet red and dark themed placeholder for the itch.io stats card.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="920" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06070b" />
      <stop offset="0.52" stop-color="#0c0b12" />
      <stop offset="1" stop-color="#190b10" />
    </linearGradient>
    <linearGradient id="brandTile" x1="30" y1="32" x2="102" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff4555" />
      <stop offset="1" stop-color="#b3122d" />
    </linearGradient>
    <linearGradient id="lineAccent" x1="30" y1="0" x2="890" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6670" />
      <stop offset="0.5" stop-color="#ff2e43" />
      <stop offset="1" stop-color="#ff9a72" />
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="116" x2="920" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff8994" stop-opacity="0.7" />
      <stop offset="0.5" stop-color="#ff3b4f" stop-opacity="0.85" />
      <stop offset="1" stop-color="#ff8b5d" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="116" x2="0" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161019" stop-opacity="0.95" />
      <stop offset="1" stop-color="#0f0c12" stop-opacity="0.95" />
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 18) rotate(50) scale(220 180)">
      <stop stop-color="#ff4555" stop-opacity="0.62" />
      <stop offset="1" stop-color="#ff4555" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(810 318) rotate(180) scale(230 160)">
      <stop stop-color="#ff6c4d" stop-opacity="0.34" />
      <stop offset="1" stop-color="#ff6c4d" stop-opacity="0" />
    </radialGradient>
    <filter id="blurGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.38" />
    </filter>
  </defs>
  <rect width="920" height="336" rx="30" fill="#05060a" />
  <circle cx="160" cy="18" r="170" fill="url(#glowLeft)" filter="url(#blurGlow)" />
  <circle cx="810" cy="318" r="170" fill="url(#glowRight)" filter="url(#blurGlow)" />
  <rect x="6" y="6" width="908" height="324" rx="24" fill="url(#cardBg)" stroke="#39202a" stroke-width="1.4" />
  <rect x="30" y="20" width="860" height="4" rx="2" fill="url(#lineAccent)" />
  <g filter="url(#cardShadow)">
    <rect x="30" y="32" width="72" height="72" rx="22" fill="url(#brandTile)" stroke="#ff8a8f" stroke-opacity="0.55" />
    <image href="data:image/png;base64," x="44" y="46" width="44" height="44" preserveAspectRatio="xMidYMid meet" />
  </g>
  <text x="126" y="79" fill="#fff5f5" font-size="34" font-weight="700">itch.io</text>
  <g>
    <rect x="694" y="38" width="178" height="34" rx="17" fill="#170d12" stroke="#5b2430" />
    <circle cx="718" cy="55" r="6" fill="#ff4b5b" />
    <text x="732" y="60" fill="#ffe4e6" font-size="13" font-weight="700">LIVE GAME METRICS</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="108" y="116" width="340" height="112" rx="28" fill="url(#panelFill)" stroke="url(#panelStroke)" />
    <text x="134" y="148" fill="#fda4af" font-size="13" font-weight="700" letter-spacing="1">TOTAL DOWNLOADS</text>
    <text x="134" y="195" fill="#fff5f5" font-size="42" font-weight="700">--</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="472" y="116" width="340" height="112" rx="28" fill="url(#panelFill)" stroke="url(#panelStroke)" />
    <text x="498" y="148" fill="#fda4af" font-size="13" font-weight="700" letter-spacing="1">TOTAL VIEWS</text>
    <text x="498" y="195" fill="#fff5f5" font-size="42" font-weight="700">--</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="30" y="242" width="860" height="84" rx="24" fill="#120c12" stroke="#5e2632" />
  </g>
  <rect x="301" y="248" width="70" height="70" rx="18" fill="#261018" opacity="0.8" />
  <rect x="381" y="248" width="70" height="70" rx="18" fill="#261018" opacity="0.8" />
  <rect x="461" y="248" width="70" height="70" rx="18" fill="#261018" opacity="0.8" />
  <rect x="304" y="251" width="64" height="64" rx="15" fill="#1a1014" stroke="#ff8c92" stroke-opacity="0.75" />
  <rect x="384" y="251" width="64" height="64" rx="15" fill="#1a1014" stroke="#ff8c92" stroke-opacity="0.75" />
  <rect x="464" y="251" width="64" height="64" rx="15" fill="#1a1014" stroke="#ff8c92" stroke-opacity="0.75" />
</svg>
